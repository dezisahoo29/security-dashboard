<!DOCTYPE html>
<html>

<head>
    <title>AI Security Dashboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        
        .box {
            background: white;
            width: 450px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        
        input {
            padding: 10px;
            margin: 8px;
            width: 220px;
        }
        
        button {
            padding: 12px 25px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
        
        #score {
            margin-top: 15px;
            font-size: 20px;
        }
        
        .low {
            color: green;
        }
        
        .medium {
            color: orange;
        }
        
        .high {
            color: red;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>🔐 AI Security Dashboard</h1>

        <input id="f1" type="number" value="100"><br>
        <input id="f2" type="number" value="200"><br>
        <input id="f3" type="number" value="300"><br>
        <input id="f4" type="number" value="400"><br>

        <button onclick="predict()">Check Threat</button>

        <div id="result"></div>
        <div id="score"></div>
    </div>

    <script>
        function predict() {
            const data = {
                features: [
                    Number(document.getElementById("f1").value),
                    Number(document.getElementById("f2").value),
                    Number(document.getElementById("f3").value),
                    Number(document.getElementById("f4").value)
                ]
            };

            fetch("https://security-dashboard-k9y9.onrender.com/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(data => {
                    let riskClass = "low";

                    if (data.risk_level === "High Risk") {
                        riskClass = "high";
                    } else if (data.risk_level === "Medium Risk") {
                        riskClass = "medium";
                    }

                    document.getElementById("result").innerHTML =
                        `<span class="${riskClass}">${data.result}</span>`;

                    document.getElementById("score").innerHTML =
                        `Threat Score: ${data.threat_score}/100 <br> Risk Level: <span class="${riskClass}">${data.risk_level}</span>`;
                })
                .catch(error => {
                    document.getElementById("result").innerText = "Error connecting to backend";
                    console.error(error);
                });
        }
    </script>

</body>

</html>
